name: "[CI]pypi dev test"
on:
  push:
    branches:
    - master
    paths:
    - 'proto/spaceone/api/**'
  workflow_dispatch:
    inputs:
      tag:
        description: '`vx.y.z-deva` 형태로 버전을 입력해주세요.'
        required: true
        default: v1.2.3-dev1

jobs:
  buff:
    if: github.repository_owner == 'spaceone-dev' && "${{ github.event_name }}" == "push"
    runs-on: ubuntu-latest
    env:
      SERVICE: api
      PYPI_UPLOAD: true # upload pypi if this is true
      # LOCATION points the parent directory
      LOCATION_SETUP_PY: dist/python # optional. for pypi upload
      LOCATION_VERSION: . # the location for VERSION file (ex- . means the location of VERSION is ./VERSION)
      IS_SUDO: true
    steps:
    - uses: actions/checkout@v2
    - name: Clone master branch
      uses: actions/checkout@v2
      with:
        ref: master
        path: master_branch
    - name: Compare version
      run: |
        echo "MASTER BRANCH VERSION"
        cat master_branch/$LOCATION_VERSION/VERSION
        echo -e "\n\n"
        echo "PR VERSION"
        cat $LOCATION_VERSION/VERSION
        echo -e "\n\n"
        echo "IS_NEW_VERSION=false" >> $GITHUB_ENV
        cmp --silent master_branch/$LOCATION_VERSION/VERSION $LOCATION_VERSION/VERSION || \
        echo "IS_NEW_VERSION=true" >> $GITHUB_ENV
        echo "API_DOC_VERSION=$(cat $LOCATION_VERSION/VERSION)" >> $GITHUB_ENV
        echo "$(cat $LOCATION_VERSION/VERSION)-${{ github.run_id }}">$LOCATION_VERSION/VERSION
    - name: Update API doc Version
      run: |
          echo "$API_DOC_VERSION">$LOCATION_VERSION/VERSION
    - name: Create documents
      run: |
        make json
    - name: Commit files # transfer the new html files back into the repository
      run: |
        git config --local user.name "xellos00"
        git add ./artifact
        git commit -m "update artifact JSON with its current version"
    - name: Push changes # push the output folder to your repo
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        force: true

    - name: Push to Api-doc # Copy artifact with version into API doc
      uses: andstor/copycat-action@v3
      with:
        personal_token: ${{ secrets.API_DOC_GITHUB_TOKEN }}
        src_path: artifact
        dst_path: /.
        dst_owner: spaceone-dev
        dst_repo_name: api-doc

    - name: Update auth on artifact
      run: |
        sudo chmod -R 777 artifact
    - name: Remove Artifact from Repo since its transfer has finished
      run: |
        git rm artifact -r -f
        git commit -m "Remove auto-generated artifact"
    - name: Push changes # push the output folder to your repo
      uses: ad-m/github-push-action@master
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        force: true

  condition_check:
    runs-on: ubuntu-latest
    if: "${{ github.event_name }}" == "wd"
    outputs:
      TAG: ${{ steps.set_env.outputs.TAG }}
    steps:
      - name: set TAG env
        id: set_env
        run: |
            echo "TAG=${{ github.event.inputs.tag }}" >> $GITHUB_ENV
            echo "::set-output name=TAG::${{ github.event.inputs.tag }}"
            echo "BRANCH=$(echo ${{ github.event.inputs.tag }} | cut -c 2-6 | awk '{print "release-"$1}')" >> $GITHUB_ENV
            echo "::set-output name=BRANCH::$(echo ${{ github.event.inputs.tag }} | cut -c 2-6 | awk '{print "release-"$1}')"
      - name: if not test release, exit
        run: |
          if [[ !(${{ env.TAG }} =~ ^v[0-9]\.[0-9]\.[0-9]-dev(.*)$) ]];
            then exit 1
          fi

  pypi:
    if: github.repository_owner == 'spaceone-dev'
    needs: [condition_check]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.condition_check.outputs.TAG }}
    steps:
      - uses: actions/checkout@v2
      - name: set version
        run: |
          echo ${{ env.VERSION }} | cut -c 2- | sed -e 's/-//g' > VERSION
      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.8'
      - name: Install dependencies
        run: |
            python -m pip install --upgrade pip
            pip install setuptools wheel twine
      - name: Build
        run: |
          make all
          sudo chmod -R 777 dist
          cd dist/python
          python setup.py sdist bdist_wheel
      - name: Upload Pypi
        id: upload
        run: |
          cd dist/python
          twine upload dist/*.whl --username ${{ secrets.PYPI_USERNAME }} --password ${{ secrets.PYPI_PASSWORD }} --verbose

  # docker:

name: "[Push] Sync CI"

on:
  push:
    branches:
      - master
    tags:
      - "v*.*"
    paths-ignore:
      - '.github/**'
      - 'src/VERSION'
  workflow_dispatch:

env:
  workflow_file_name: deploy.yaml
  owner: spaceone-dev
  repo: actions
  ref: master

jobs:
  get_topic:
    runs-on: ubuntu-latest
  master_push:
    if: github.event_name == 'push' || ${{ github.repo_name != 'spaceone-intiailizer' }}
    runs-on: ubuntu-latest
    steps:
      - name: git pull - from branch
        if: ${{ github.event.ref_type == 'branch' }} && ${{ github.repo_name != 'api' }} && ${{ github.repo_name != 'python-core' }}
        uses: convictional/trigger-workflow-and-wait@v1.3.0
        with:
          owner: ${{ env.owner }}
          repo: ${{ env.repo }}
          github_token: ${{ secrets.PAT_TOKEN }}
          workflow_file_name: ${{ env.workflow_file_name }}
          ref: ${{ env.ref }}
          wait_interval: 10
          inputs: '{"repository" : "${{ github.repository }}" , "type" : "branch"}'
          trigger_workflow: true
          wait_workflow: true
      # - name: git pull - from tag
      #   if: ${{ github.event.ref_type == 'tag' }} && ${{ github.repo_name != 'api' }} && ${{ github.repo_name != 'python-core' }} && ${{ github.repo_name != 'spacectl' }}
      #   uses: convictional/trigger-workflow-and-wait@v1.3.0
      #   with:
      #     owner: ${{ env.owner }}
      #     repo: ${{ env.repo }}
      #     github_token: ${{ secrets.PAT_TOKEN }}
      #     workflow_file_name: ${{ env.workflow_file_name }}
      #     ref: ${{ env.ref }}
      #     wait_interval: 10
      #     inputs: '{"repository" : "${{ github.repository }} , "type" : "tag"}'
      #     trigger_workflow: true
          wait_workflow: true
      - name: sync_only - from tag
        if:  ${{ github.repo_name == 'api' }} || ${{ github.repo_name == 'python-core' }} || ${{ github.repo_name == 'spacectl' }} && ${{ github.event.ref_type == 'tag' }}
        uses: convictional/trigger-workflow-and-wait@v1.3.0
        with:
          owner: ${{ env.owner }}
          repo: ${{ env.repo }}
          github_token: ${{ secrets.PAT_TOKEN }}
          workflow_file_name: ${{ env.workflow_file_name }}
          ref: ${{ env.ref }}
          wait_interval: 10
          inputs: '{"repository" : "${{ github.repository }}" , "sync_only" : "true"}'
          trigger_workflow: true
          wait_workflow: true

  pull_workflows:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: git pull
        uses: convictional/trigger-workflow-and-wait@v1.3.0
        with:
          owner: ${{ env.owner }}
          repo: ${{ env.repo }}
          github_token: ${{ secrets.PAT_TOKEN }}
          workflow_file_name: ${{ env.workflow_file_name }}
          ref: ${{ env.ref }}
          wait_interval: 10
          inputs: '{"repository" : "${{ github.repository }}" , "sync_only" : "true"}'
          trigger_workflow: true
          wait_workflow: true
